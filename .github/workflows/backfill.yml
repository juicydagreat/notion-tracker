name: AUD Backfill (all tiles)

# Manual only. Backfills 'Price AUD' / 'AUD Delta' on all SOL and ETH rows
# and creates/updates the combined 'AUD' total tiles for every historical
# date, using bulk historical prices. Safe to re-run (overwrites the AUD
# columns so the delta chain stays consistent; AUD rows are updated in
# place, not duplicated).
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backfill
        env:
          NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET:   ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL:  ${{ secrets.NOTION_DB_DAILYTOTAL }}
          TITLE_PROP_PERWALLET:  ${{ secrets.TITLE_PROP_PERWALLET }}
          COINGECKO_API_KEY:     ${{ secrets.COINGECKO_API_KEY }}
        run: python backfill_aud.py
