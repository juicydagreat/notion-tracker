name: Robinhood Chain Notion Tracker

on:
  schedule:
    - cron: "30 17 * * *"   # 5:30 PM UTC daily (offset from the SOL tracker at 17:00)
  workflow_dispatch:
    inputs:
      mode:
        description: "Which script to run"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - diagnostic

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        # No pip install needed — pure stdlib

      - name: Select script
        id: choose
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.mode }}" = "production" ]; then
            echo "script=eth_robinhood_to_notion.py" >> $GITHUB_OUTPUT
          else
            echo "script=eth_diagnostic.py" >> $GITHUB_OUTPUT
          fi

      - name: Run script
        env:
          NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET:   ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL:  ${{ secrets.NOTION_DB_DAILYTOTAL }}
          ETH_WALLETS_CSV:       ${{ secrets.ETH_WALLETS_CSV }}
          TITLE_PROP_PERWALLET:  ${{ secrets.TITLE_PROP_PERWALLET }}
          # Robinhood Chain mainnet (chain id 4663), native gas token = ETH
          RH_PRIMARY_RPC:        "https://rpc.mainnet.chain.robinhood.com"
          RH_FALLBACK_RPC:       ""
          # Stablecoin column — Tether USD (USDT) on Robinhood Chain. Override via secrets if desired.
          STABLE_CONTRACT:       "0xE246BC49b0598d7Cd9f0eAD48B885034f1254380"
          STABLE_DECIMALS:       "6"
          STABLE_SYMBOL:         "USDT"
          # Tuning
          BATCH_SIZE:            "10"
          BATCH_PAUSE:           "1.0"
          CALL_DELAY:            "0.5"
          RPC_TIMEOUT:           "30"
          RPC_RETRIES:           "5"
          RPC_BACKOFF_CAP:       "30"
        run: python "${{ steps.choose.outputs.script }}"
