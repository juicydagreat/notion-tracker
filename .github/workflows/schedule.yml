name: Solana Tracker (Daily 3am AEST)

on:
  schedule:
    # 03:00 AEST daily (UTC+10) => 17:00 UTC previous day
    - cron: "0 17 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET: ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL: ${{ secrets.NOTION_DB_DAILYTOTAL }}
          WALLETS_CSV: ${{ secrets.WALLETS_CSV }}

          # Title column name in your Per-Wallet Notion DB (your screenshot shows it's "Wallet")
          TITLE_PROP_PERWALLET: ${{ secrets.TITLE_PROP_PERWALLET }}

          # Optional: use your private RPC (recommended to avoid 429s)
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}

        run: |
          python sol_diagnostic.py
