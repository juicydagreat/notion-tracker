name: Solana Notion Tracker

on:
  schedule:
    - cron: "0 17 * * *"   # 5 PM UTC daily
  workflow_dispatch:
    inputs:
      mode:
        description: "Which script to run"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - diagnostic

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        # No pip install needed — scripts use only Python stdlib

      - name: Select script
        id: choose
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.mode }}" = "production" ]; then
            echo "script=sol_multi_to_notion.py" >> $GITHUB_OUTPUT
          else
            echo "script=sol_diagnostic.py" >> $GITHUB_OUTPUT
          fi

      - name: Run script
        env:
          NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET:   ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL:  ${{ secrets.NOTION_DB_DAILYTOTAL }}
          WALLETS_CSV:           ${{ secrets.WALLETS_CSV }}
          USDC_MINT:             ${{ secrets.USDC_MINT }}
          USDC_WALLET:           ${{ secrets.USDC_WALLET }}
          TITLE_PROP_PERWALLET:  ${{ secrets.TITLE_PROP_PERWALLET }}
          # Ankr free public endpoint — no key needed, handles batch well
          # Your SOLANA_RPC_URL secret (if set) becomes the fallback, not primary
          SOLANA_RPC_URL:        "https://rpc.ankr.com/solana"
          SOLANA_RPC_FALLBACK:   ${{ secrets.SOLANA_RPC_URL || 'https://api.mainnet-beta.solana.com' }}
          # Tuning
          BATCH_SIZE:            "50"
          BATCH_PAUSE:           "1.0"
          RPC_TIMEOUT:           "30"
          RPC_RETRIES:           "5"
          RPC_BACKOFF_CAP:       "30"
        run: python "${{ steps.choose.outputs.script }}"
