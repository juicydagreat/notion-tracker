name: Solana Notion Tracker

on:
  schedule:
    - cron: "0 17 * * *"   # 5 PM UTC daily
  workflow_dispatch:
    inputs:
      mode:
        description: "Which script to run"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - diagnostic

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        # No pip install needed — pure stdlib

      - name: Select script
        id: choose
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.mode }}" = "production" ]; then
            echo "script=sol_multi_to_notion.py" >> $GITHUB_OUTPUT
          else
            echo "script=sol_diagnostic.py" >> $GITHUB_OUTPUT
          fi

      - name: Run script
        env:
          NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET:   ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL:  ${{ secrets.NOTION_DB_DAILYTOTAL }}
          WALLETS_CSV:           ${{ secrets.WALLETS_CSV }}
          USDC_MINT:             ${{ secrets.USDC_MINT }}
          USDC_WALLET:           ${{ secrets.USDC_WALLET }}
          TITLE_PROP_PERWALLET:  ${{ secrets.TITLE_PROP_PERWALLET }}
          # AUD price (CoinGecko). Key is optional — free tier works without it.
          PRICE_COIN_ID:         "solana"
          COINGECKO_API_KEY:     ${{ secrets.COINGECKO_API_KEY }}
          # Batch RPC endpoints (optional — if blocked, script auto-falls back to individual calls)
          SOLANA_PRIMARY_RPC:    "https://solana-rpc.publicnode.com"
          SOLANA_FALLBACK_RPC:   "https://rpc.ankr.com/solana"
          # Individual call fallback — mainnet-beta handles sequential calls fine
          INDIVIDUAL_RPC:        "https://api.mainnet-beta.solana.com"
          INDIVIDUAL_DELAY:      "2.0"
          # Batch tuning (only used if batch succeeds)
          BATCH_SIZE:            "10"
          BATCH_PAUSE:           "2.0"
          RPC_TIMEOUT:           "30"
          RPC_RETRIES:           "5"
          RPC_BACKOFF_CAP:       "30"
        run: python "${{ steps.choose.outputs.script }}"
