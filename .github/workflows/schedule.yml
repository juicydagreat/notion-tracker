name: Solana Tracker (Hourly)

on:
  schedule:
    - cron: "5 * * * *"   # runs every hour at :05 UTC
  workflow_dispatch: {}    # lets you run it manually too

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run the Solana tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET: ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL: ${{ secrets.NOTION_DB_DAILYTOTAL }}
          WALLETS_CSV: ${{ secrets.WALLETS_CSV }}
        run: |
          python sol_multi_to_notion.py
