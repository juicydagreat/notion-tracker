name: Solana Tracker (Daily 3am AEST)

on:
  schedule:
    - cron: "0 17 * * *" # 03:00 AEST daily (UTC+10)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tracker
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET: ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL: ${{ secrets.NOTION_DB_DAILYTOTAL }}
          WALLETS_CSV: ${{ secrets.WALLETS_CSV }}

          # 🔑 TITLE COLUMN OVERRIDES (CRITICAL)
          TITLE_PROP_PERWALLET: Wallet
          TOTAL_TITLE_PROP: Name

          # Optional (recommended to avoid rate limits)
          SOLANA_RPC_URL: https://api.mainnet-beta.solana.com

        run: |
          python sol_multi_to_notion.py
