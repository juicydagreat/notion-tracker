Here is the full replacement for `schedule.yml`:

```yaml
name: Solana Notion Tracker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker
        run: python sol_multi_to_notion.py
        env:
          NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_PERWALLET:   ${{ secrets.NOTION_DB_PERWALLET }}
          NOTION_DB_DAILYTOTAL:  ${{ secrets.NOTION_DB_DAILYTOTAL }}
          SOLANA_RPC_URL:        ${{ secrets.SOLANA_RPC_URL }}
          WALLETS_CSV:           ${{ secrets.WALLETS_CSV }}
          USDC_WALLET:           ${{ secrets.USDC_WALLET }}
          USDC_MINT:             ${{ secrets.USDC_MINT }}
          TITLE_PROP_PERWALLET:  ${{ secrets.TITLE_PROP_PERWALLET }}
          RPC_TIMEOUT:           "30"
          RPC_RETRIES:           "8"
          RPC_DELAY_SOL:         "0.35"
          RPC_DELAY_USDC:        "0.5"
          RPC_BACKOFF_CAP:       "30.0"
```

Paste this in full as the replacement for your current `schedule.yml`, commit, then run manually from Actions.
