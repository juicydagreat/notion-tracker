name: Find Funded Wallets

on:
  workflow_dispatch:
    inputs:
      wallet:
        description: "Source Solana wallet address"
        required: true
        default: "F5CLqaNWNoYPJHMAUD4Vz1aY41dydWHaju9veHN7wwD2"
      rpc_url:
        description: "Solana RPC endpoint (leave blank for public mainnet)"
        required: false
        default: "https://api.mainnet-beta.solana.com"
      delay:
        description: "Seconds between batch fetches (increase if rate-limited)"
        required: false
        default: "1.2"

jobs:
  find-wallets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/find-funded-wallets-N2U8O

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run wallet finder
        run: |
          python wallet-finder/find_funded_wallets.py \
            "${{ github.event.inputs.wallet }}" \
            --rpc "${{ github.event.inputs.rpc_url }}" \
            --delay "${{ github.event.inputs.delay }}" \
            --out results.csv

      - name: Upload CSV results
        uses: actions/upload-artifact@v4
        with:
          name: wallet-results-${{ github.run_number }}
          path: results.csv
          retention-days: 30
